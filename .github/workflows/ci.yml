name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref — keeps the queue cheap.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # The render test degrades to the Graphviz structural fallback when
      # processpiper isn't installed. We install Graphviz so CI exercises that
      # documented path instead of skipping rendering entirely.
      - name: Install Graphviz (render fallback backend)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends graphviz

      - run: npm install
        # npm install (not ci): the lock was generated on aarch64 and the
        # Flue -> Cloudflare-worker platform optional deps (workerd/emnapi)
        # don't reconcile on x64 under a strict clean install. install
        # reconciles them per-platform; we don't need the worker runtime for
        # typecheck/test anyway.

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
